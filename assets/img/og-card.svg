<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">CyberGlossary - Pentest Edition</title>
  <desc id="desc">Imagem social para compartilhamento do Glossario Cyber.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#090b0f"/>
      <stop offset="100%" stop-color="#131924"/>
    </linearGradient>
    <linearGradient id="gridGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <g opacity="0.2" stroke="#00ff88" stroke-width="1">
    <path d="M0 90H1200M0 180H1200M0 270H1200M0 360H1200M0 450H1200M0 540H1200"/>
    <path d="M120 0V630M240 0V630M360 0V630M480 0V630M600 0V630M720 0V630M840 0V630M960 0V630M1080 0V630"/>
  </g>

  <rect x="72" y="72" width="1056" height="486" rx="20" fill="#0f141f" stroke="#1f2b3a"/>
  <rect x="72" y="72" width="1056" height="486" rx="20" fill="url(#gridGlow)" opacity="0.35"/>

  <g transform="translate(132 154)">
    <polygon points="44,0 88,24 88,72 44,96 0,72 0,24" fill="none" stroke="#00ff88" stroke-width="4"/>
    <text x="122" y="34" fill="#00ff88" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="52" font-weight="700" letter-spacing="2">CyberGlossary</text>
    <text x="122" y="78" fill="#7fffd0" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="26" letter-spacing="3">PENTEST EDITION</text>
  </g>

  <g transform="translate(132 300)">
    <text x="0" y="0" fill="#d9e7f5" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="28">Glossario de seguranca ofensiva e defensiva</text>
    <text x="0" y="46" fill="#9eb6cf" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="24">com termos, ferramentas e exemplos de laboratorio.</text>
  </g>

  <g transform="translate(132 444)" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="20" fill="#00d4ff">
    <text x="0" y="0">WEB  |  RED TEAM  |  DFIR  |  CLOUD IDENTITY  |  MOBILE</text>
  </g>
</svg>
