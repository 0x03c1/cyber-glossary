<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="Glossário Cyber com foco em Pentest e Red Team em laboratório: termos, ferramentas associadas e exemplos práticos para estudo.">
  <meta name="keywords"
    content="cybersecurity, pentest, red team, glossary, glossário, segurança, web security, malware, forense, DFIR">
  <meta name="author" content="CyberGlossary">
  <meta name="robots" content="index, follow">
  <meta name="theme-color" content="#0a0c0f">
  <meta name="color-scheme" content="dark">

  <meta property="og:type" content="website">
  <meta property="og:locale" content="pt_BR">
  <meta property="og:title" content="Glossário Cyber ∆ Pentest Edition">
  <meta property="og:description"
    content="Termos de cibersegurança com foco em Pentest e Red Team acadêmico, com ferramentas e exemplos em laboratório.">
  <meta property="og:site_name" content="CyberGlossary">
  <meta property="og:image" content="assets/img/og-cardy.svg">
  <meta property="og:image:type" content="image/svg+xml">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Glossário Cyber // Pentest Edition">
  <meta name="twitter:description"
    content="Glossário de cibersegurança com termos, ferramentas e exemplos práticos para laboratório.">
  <meta name="twitter:image" content="assets/img/og-card.svg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230a0c0f'/%3E%3Cpath d='M32 8 52 20v24L32 56 12 44V20Z' fill='none' stroke='%2300ff88' stroke-width='4'/%3E%3C/svg%3E">
  <link rel="canonical" href="./">
  <title>Glossário Cyber // Pentest Edition</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>

  <div class="header">
    <div class="header-top">
      <div class="logo">
        <div class="logo-icon">⬡</div>
        <div class="logo-text">
          <span class="logo-main">CyberGlossary</span>
          <span class="logo-sub">Pentest Edition // v1.0</span>
        </div>
      </div>
      <div class="stats">
        <div class="stat-item">
          <span class="stat-num" id="total-count">0</span>
          <span>termos</span>
        </div>
        <div class="stat-item">
          <span class="stat-num" id="visible-count">0</span>
          <span>visíveis</span>
        </div>
      </div>
    </div>
    <div class="search-bar">
      <span class="search-prompt">root@cyber:~$</span>
      <input type="text" class="search-input" id="searchInput" placeholder="grep -i 'termo' glossario.db"
        autocomplete="off" spellcheck="false">
      <div class="search-options" id="searchOptions">
        <button class="search-toggle" id="wordToggle" type="button">-w</button>
        <button class="search-toggle" id="regexToggle" type="button">regex</button>
      </div>
      <span class="search-count" id="searchCount"></span>
    </div>
  </div>

  <div class="filters" id="filterBar">
    <button class="filter-btn active" data-filter="all">Todos</button>
    <button class="filter-btn" data-filter="pentest">Pentest</button>
    <button class="filter-btn" data-filter="network">Redes</button>
    <button class="filter-btn" data-filter="web">Web</button>
    <button class="filter-btn" data-filter="mobile">Mobile</button>
    <button class="filter-btn" data-filter="malware">Malware</button>
    <button class="filter-btn" data-filter="crypto">Criptografia</button>
    <button class="filter-btn" data-filter="social">Engenharia Social</button>
    <button class="filter-btn" data-filter="defense">Defesa</button>
    <button class="filter-btn" data-filter="forensics">Forense</button>
  </div>

  <div class="main">
    <div class="sidebar">
      <div class="sidebar-title">// Índice</div>
      <div id="letterIndex"></div>
    </div>
    <div class="content" id="glossaryContent"></div>
  </div>

  <div class="pagination" id="paginationBar">
    <button class="page-btn" id="prevPageBtn" type="button">Anterior</button>
    <span class="page-info" id="pageInfo">Página 1 de 1</span>
    <button class="page-btn" id="nextPageBtn" type="button">Próxima</button>
  </div>

  <script src="assets/js/app.js"></script>
</body>

</html>
